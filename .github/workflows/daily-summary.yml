name: Daily Summary

on:
  schedule:
    - cron: "5 * * * *"
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deployed job
        env:
          DAILY_SUMMARY_URL: ${{ secrets.DAILY_SUMMARY_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          test -n "$DAILY_SUMMARY_URL"
          test -n "$CRON_SECRET"
          curl --fail --show-error --silent \
            --request POST "$DAILY_SUMMARY_URL/api/jobs/daily-summary" \
            --header "Authorization: Bearer $CRON_SECRET"
